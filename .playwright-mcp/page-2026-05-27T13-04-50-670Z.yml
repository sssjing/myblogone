%BE%E7%9A%84%E6%8B%93%E6%89%91%E5%BA%8F%E5%88%97.html\" class=\"\"><header class=\"title\"><!----><!----><span property=\"headline\">图的拓扑序列</span></header></a><div class=\"article-excerpt\"><ul> <li> <p>有向图</p> </li> <li> <p>不能有环</p> </li> <li> <p>所有边都是从前指向后的</p> </li> <li> <p>有向无环图一定存在拓扑序列</p> </li> <li> <p>有向无环图也被称为拓扑图</p> </li> </ul> <p>有向图里有两个度数：入度和出度</p> <ul> <li>入度：有多少边指向自己</li> <li>出度：有多少边指出去</li> <li>入度为0表示没有任何一条边指向自己，可以作为起点</li> <li>一个有向无环图一定至少存在一个入度为0的点</li> </ul> <div class=\"language-cpp line-numbers-mode\" data-ext=\"cpp\"><pre class=\"language-cpp\"><code>queue <span class=\"token operator\">&lt;</span><span class=\"token operator\">-</span> 所有入度为<span class=\"token number\">0</span>的点 <span class=\"token keyword\">while</span> queue 不空 <span class=\"token punctuation\">{</span> t <span class=\"token operator\">&lt;</span><span class=\"token operator\">-</span> 队头 枚举所有t的出边 t <span class=\"token operator\">-&gt;</span> j 删掉 t <span class=\"token operator\">-&gt;</span> j d<span class=\"token punctuation\">[</span>j<span class=\"token punctuation\">]</span> <span class=\"token operator\">--</span> <span class=\"token keyword\">if</span> d<span class=\"token punctuation\">[</span>j<span class=\"token punctuation\">]</span> <span class=\"token operator\">==</span> <span class=\"token number\">0</span><span class=\"token punctuation\">;</span> queue <span class=\"token operator\">&lt;</span><span class=\"token operator\">-</span> j <span class=\"token punctuation\">}</span> </code></pre><div class=\"line-numbers\" aria-hidden=\"true\"><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div><div class=\"line-number\"></div></div></div></div><hr class=\"hr\"><div class=\"page-info\"><span class=\"page-author-info\" aria-la