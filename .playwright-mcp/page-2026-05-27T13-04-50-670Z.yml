lass=\"page-category-item category5 clickable\" role=\"navigation\">数据结构</span><span class=\"page-category-item category6 clickable\" role=\"navigation\">算法</span><!--]--><meta property=\"articleSection\" content=\"数据结构,算法\"></span><!----></div></article></div><div class=\"article-item\"><article class=\"article\" vocab=\"https://schema.org/\" typeof=\"Article\"><!--[--><!--]--><!----><a href=\"/myblogone/posts/rust/rust%E5%85%A5%E9%97%A8/19-.html\" class=\"\"><header class=\"title\"><!----><!----><span property=\"headline\">19.高级特性</span></header></a><div class=\"article-excerpt\"><h2> 19.1 不安全Rust</h2> <h3> 匹配命名变量</h3> <ul> <li>隐藏着第二个语言，它没有强制内存安全保证：Unsafe Rust <ul> <li>和不同的Rust一样，但提供了额外的“超能力”</li> </ul> </li> <li>Unsafe Rust存在的原因 <ul> <li>静态分析是保守的 <ul> <li>使用Unsafe Rust：我知道自己在做什么，并承担相应风险</li> </ul> </li> <li>计算机本身就是不安全的，Rust需要能够进行底层系统编程</li> </ul> </li> </ul> <h3> Unsafe超能力</h3></div><hr class=\"hr\"><div class=\"page-info\"><span class=\"page-author-info\" aria-label=\"作者🖊\" data-balloon-pos=\"down\"><svg xmlns=\"http://www.w3.org/2000/svg\" class=\"icon author-icon\" viewBox=\"0 0 1024 1024\" fill=\"currentColor\" aria-label=\"author icon\"><path d=\"M649.6 633.6c86.4-48 147.2-144 147.2-249.6 0-160-128-288-288-288s-288 128-288 288c0 108.8 57.6 201.6 147.2 249.6-121.6 48-214.4 153.6-240 288-3.2 9.6 0 19.2 6.4 25.6 3.2 9.6 12.8 12.8 22.4 12.8h704c9.6 0 19.2-3.2 25.6-12.8 6.4-6.4 9.6-16 6.4-25.6-25.6-134.4-121.6-240-243.2-288z\"></path></svg><span><a class=\"page-author-item\" href=\"https://github.com/sssjing/myblogone\" target=\"_blank\" rel=\"noopener noreferrer\">杨景</a></span><span property=\"author\" content=\"杨景\"></span></span><!----><span class=\"page-date-info\" aria-label=\"写作日期📅\" data-balloon-pos=\"down\"><svg xmlns=\"http://www.w3.org/2000/svg\" class=\"icon calendar-icon\" viewBox=\"0 0 1024 1024\" fill=\"currentColor\" aria-label=\"calendar icon\"><path d=\"M716.4 110.137c0-18.753-14.72-33.473-33.472-33.473-18.753 0-33.473 14.72-33.473 33.473v33.473h