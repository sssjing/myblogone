          - link [ref=e1381] [cursor=pointer]:
            - /url: "#什么是bean"
            - text: "#"
          - text: 什么是Bean
        - paragraph [ref=e1382]:
          - text: Bean是Java中
          - strong [ref=e1383]: 可重用软件组件
          - text: ，Spring容器也遵循这一惯例，因此将容器中管理的可重用组件称为Bean。
        - paragraph [ref=e1384]:
          - text: 容器会根据提供的元数据来创建并管理这些Bean，其中也包括它们之间的依赖关系。 Spring容器对Bean并没有太多要求，无需实现特定接口或依赖特定库，只要是最普通的Java对象即可，这类对象也被称为
          - strong [ref=e1385]: POJO（Plain Old Java Object）
        - paragraph [ref=e1386]: 一个Bean的定义中，会包含如下部分：
        - list [ref=e1387]:
          - listitem [ref=e1388]: Bean的名称，一般是Bean的id，也可以为Bean指定别名（alias）
          - listitem [ref=e1389]: Bean的具体类信息，这是一个全限定类名
          - listitem [ref=e1390]: Bean的作用域，单例（singleton）还是原型（prototype）
          - listitem [ref=e1391]: 依赖注入相关信息，构造方法参数，属性以及自动织入（autowire）方式
          - listitem [ref=e1392]: 创建销毁相关信息，懒加载模式、初始化回调方法与销毁回调方法
        - paragraph [ref=e1393]: 我们可以自行设置Bean的名称，也可以让Spring容器帮我们设置名称。Spring容器的命名方式为类名的首字母小写，搭配驼峰（camel-cased）规则。比如类型为HelloService的bean，自动生成的名称就为helloService
        - heading "Bean的依赖关系" [level=3] [ref=e1394]:
