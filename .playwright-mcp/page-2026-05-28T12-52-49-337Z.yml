        - paragraph [ref=e1272]: JVM 是一台基于栈的计算机器。 每个线程都有一个独属于自己的线程栈（JVM Stack），用于存储栈帧（Frame）。 每一次方法调用、JVM 都会自动创建一个栈帧。 栈帧由操作数栈、 局部变量数组以及一个 Class 引用组成。 Class 引用指向当前方法在运行时常量池中对应的 Class。
