        - heading "什么是IoC容器" [level=3] [ref=e1173]:
          - link [ref=e1174] [cursor=pointer]:
            - /url: "#什么是ioc容器"
            - text: "#"
          - text: 什么是IoC容器
        - paragraph [ref=e1175]: 控制反转（Inversion of Control，IoC）
        - paragraph [ref=e1176]:
          - mark [ref=e1177]: 控制反转
          - text: 是一种决定容器如何装配组件的模式，
          - mark [ref=e1178]: 容器
          - text: 就是创建组件并对他们进行管理的地方，它牵扯到组件该如何定义、组件该何时创建、又该何时销毁、它们互相之间是什么关系等。这些本应该在组件内部管理的东西，被从组件中剥离出来。
        - paragraph [ref=e1179]: 所有组件都要被动接受容器的控制
        - paragraph [ref=e1180]:
          - mark [ref=e1181]: 依赖注入
          - text: （Dependency Injection）可以更好的对控制反转进行描述
        - paragraph [ref=e1182]: Spring容器就是Spring Framework中的IoC容器
        - paragraph [ref=e1183]: 将业务对象（也就是组件，在Spring中这些组件被称为Bean）和关于组件的配置元数据（比如依赖关系）输入Spring容器中，容器就可以组装一个可用的系统。
        - heading "容器的初始化" [level=3] [ref=e1184]:
          - link [ref=e1185] [cursor=pointer]:
            - /url: "#容器的初始化"
            - text: "#"
          - text: 容器的初始化
        - paragraph [ref=e1186]:
          - text: Spring容器的配置需要
          - strong [ref=e1187]: 元数据
          - text: 和
          - strong [ref=e1188]: 业务对象
        - paragraph [ref=e1189]: 配置元数据的方式：
        - list [ref=e1190]:
          - listitem [ref=e1191]: 从XML配置文件配置（早期）
          - listitem [ref=e1192]: 通过注解
          - listitem [ref=e1193]: 通过java类
        - paragraph [ref=e1194]: 容器初始化的大致步骤：
        - list [ref=e1195]:
          - listitem [ref=e1196]: 从XML文件、Java类或其他地方配置元数据。
          - listitem [ref=e1197]: 通过BeanFactoryPostProcessor对配置元数据进行一轮处理。
          - listitem [ref=e1198]: 初始化Bean实例，并根据给定的依赖关系组装对象。
          - listitem [ref=e1199]: 通过BeanPostProcessor对Bean进行处理，期间还会触发Bean被构造后的回调方法。
        - paragraph [ref=e1200]:
          - text: 比如下列代码所示的
          - strong [ref=e1201]: 业务对象
          - text: ，它会返回一个字符串，可以看到他就是一个最普通的java类
